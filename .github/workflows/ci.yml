name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/freshcart_ci
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
      - name: Install frontend dependencies
        run: npm ci --prefix client
      - name: Install backend dependencies
        run: npm ci --prefix server
      - name: Audit production dependencies
        run: |
          npm audit --prefix client --omit=dev --audit-level=high
          npm audit --prefix server --omit=dev --audit-level=high
      - name: Verify application
        run: npm run verify
      - name: Install browser for end-to-end tests
        working-directory: client
        run: npx playwright install --with-deps chromium
      - name: Run browser and accessibility tests
        run: npm --prefix client run test:e2e
