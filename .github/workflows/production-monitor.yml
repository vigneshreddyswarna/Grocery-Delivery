name: Production monitor

on:
  schedule:
    - cron: "17,47 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check storefront
        run: curl --fail --silent --show-error --retry 3 --retry-all-errors --max-time 20 https://grocery-delivery-web.vercel.app/ > /dev/null
      - name: Check API process health
        run: curl --fail --silent --show-error --retry 3 --retry-all-errors --max-time 20 https://grocery-delivery-api-omega.vercel.app/api/health
      - name: Check API database readiness
        run: curl --fail --silent --show-error --retry 3 --retry-all-errors --max-time 20 https://grocery-delivery-api-omega.vercel.app/api/ready
